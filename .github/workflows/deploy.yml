name: CI/CD to AWS EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: prod
      url: https://www.satto.io.kr

    permissions:
      contents: read

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: swa07016/satto-server-fastapi

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ steps.meta.outputs.short_sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          port: 22
          envs: REGISTRY,IMAGE_NAME,IMAGE_TAG,GHCR_USERNAME,GHCR_PAT
          script: |
            set -e

            cd /home/ec2-user/Satto-Server

            echo "$GHCR_PAT" | docker login "$REGISTRY" -u "$GHCR_USERNAME" --password-stdin

            export FASTAPI_IMAGE="$REGISTRY/$IMAGE_NAME:$IMAGE_TAG"

            docker compose -f docker-compose.dev.yml pull fastapi
            docker compose -f docker-compose.dev.yml up -d --no-deps fastapi
            docker compose -f docker-compose.dev.yml ps fastapi

            docker image prune -f